<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内SE転職ナビ | PR広告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .lp-wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
  }

  /* LP画像 */
  .lp-img {
    width: 100%;
    display: block;
  }

  /* CTAボタンエリア */
  .cta-area {
    padding: 24px 20px 40px;
    text-align: center;
    background: #f8f9fa;
  }
  .cta-btn {
    display: inline-block;
    width: 92%;
    background: linear-gradient(135deg,#1a6fff,#0044cc);
    color: #fff;
    font-size: clamp(17px, 4.5vw, 22px);
    font-weight: 900;
    text-align: center;
    text-decoration: none;
    padding: 20px 16px;
    border-radius: 50px;
    box-shadow: 0 6px 28px rgba(30,100,255,0.5);
    letter-spacing: 0.04em;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  /* shimmer（流れる光） */
  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,0.38) 50%,
      transparent 100%
    );
    animation: shimmer 2.4s infinite;
  }
  @keyframes shimmer {
    0%   { left: -75%; }
    100% { left: 125%; }
  }

  /* pulse glow（外側に広がる光輪） */
  .cta-btn-wrap {
    position: relative;
    display: inline-block;
    width: 92%;
    border-radius: 50px;
    animation: pulse-ring 2s infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(30,100,255,0.5); }
    70%  { box-shadow: 0 0 0 14px rgba(0,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }

  .cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 36px rgba(30,100,255,0.5);
  }
  .cta-btn:active { transform: translateY(0); }

  /* リンク未設定時（準備中）スタイル */
  
  
  

  .cta-sub {
    margin-top: 12px;
    font-size: 12px;
    color: #888;
    letter-spacing: 0.03em;
  }

  /* CTA active: orange + shine */
  .cta-btn--active {
    background: linear-gradient(135deg,#ff8c00,#ff4500) !important;
    box-shadow: 0 6px 28px rgba(255,100,0,0.5) !important;
    cursor: pointer !important;
    animation: none !important;
  }
  .cta-btn--active::before {
    display: block !important;
    content: '' !important;
    position: absolute !important;
    top: 0; left: -75% !important;
    width: 50%; height: 100% !important;
    background: linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent) !important;
    animation: shine 2.4s infinite !important;
  }
  @keyframes shine {
    0%  { left: -75%; }
    60% { left: 125%; }
    100%{ left: 125%; }
  }
  .cta-btn-wrap:has(.cta-btn--active) { animation: pulse-ring 2s infinite !important; }

  /* back-bar */
  .back-bar{width:100%;background:#eef2ff;border-bottom:1px solid #c5d0f5;padding:6px 12px;box-sizing:border-box;display:block;}
  .back-bar a{color:#1a56c4;font-size:0.8rem;font-weight:700;text-decoration:none;white-space:nowrap;}
  .back-bar a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div style="width:100%;display:flex;justify-content:center;align-items:center;padding:20px 16px 28px;background:#f8f9ff;border-top:1px solid #dde4f5;box-sizing:border-box;">
  <a href="https://ricesan7.github.io/life-navi/" style="color:#1a56c4;font-size:0.88rem;font-weight:700;text-decoration:none;padding:10px 28px;border:2px solid #1a56c4;border-radius:24px;background:#fff;white-space:nowrap;">&#8592; ライフナビ トップへ戻る</a>
</div>
</body>
</html>
